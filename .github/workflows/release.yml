name: Build and Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform/build-tools
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: ./gradlew clean :app:assembleRelease --no-daemon --stacktrace

      - name: Extract version from gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP 'v\d+\.\d+\.\d+|\d+\.\d+') | head -1
          if [ -z "$VERSION" ]; then
            # Generate version if extraction fails
            DATE=$(date +%y%j)
            VERSION="3.${DATE}"
          fi
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ steps.version.outputs.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
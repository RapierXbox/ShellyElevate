name: Build and Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform/build-tools
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Validate signing secrets
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$SIGNING_KEYSTORE_BASE64" ] && missing+=("SIGNING_KEYSTORE_BASE64")
          [ -z "$SIGNING_STORE_PASSWORD" ] && missing+=("SIGNING_STORE_PASSWORD")
          [ -z "$SIGNING_KEY_ALIAS" ] && missing+=("SIGNING_KEY_ALIAS")
          [ -z "$SIGNING_KEY_PASSWORD" ] && missing+=("SIGNING_KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew clean :app:assembleRelease --no-daemon --stacktrace

      - name: Extract version from gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP 'v\d+\.\d+\.\d+\.\d+|\d+\.\d+\.\d+') | head -1
          if [ -z "$VERSION" ]; then
            # Generate version if extraction fails
            DATE=$(date +%y%j)
            TIME=$(date +%H%M)
            VERSION="3.${DATE}.${TIME}"
          fi
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ steps.version.outputs.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare APK for release
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
          cp app/build/outputs/apk/release/*.apk ShellyElevateV2-${VERSION}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            ShellyElevateV2-*.apk